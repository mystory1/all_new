<style>
:root{
  --bg:#0b1020;
  --card:#111827;
  --muted:#94a3b8;
  --text:#e5e7eb;
  --accent:#60a5fa;
  --accent2:#34d399;
  --border:#243045;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial,sans-serif;
  background:linear-gradient(180deg,#07101f,#0b1020 20%,#0b1020);
  color:var(--text);
}

.container{max-width:1200px;margin:0 auto;padding:20px}

h1{font-size:clamp(24px,3vw,40px);margin:0 0 8px}

.sub{color:var(--muted);margin:0 0 18px;line-height:1.5}

.grid{
  display:grid;
  grid-template-columns:repeat(1,minmax(0,1fr));
  gap:16px;
}

@media(min-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}

.card{
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#1f2937;
  color:#cbd5e1;
  font-size:12px;
  margin-right:8px;
}

.title{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}

.h{font-size:18px;font-weight:700;margin:0 0 6px}

table{width:100%;border-collapse:collapse}

td,th{
  text-align:left;
  padding:8px 6px;
  border-top:1px solid #223044;
  font-size:14px;
}

th{color:#cbd5e1;font-weight:600;border-top:none}

.ai{color:#93c5fd;font-weight:600}
.dr{color:#86efac;font-weight:700}
</style>
</head>

<body>

<div class="container">

<h1>Dostihy – prehľad analýz</h1>
<p class="sub">Dashboard s porovnaním výstupov viacerých modelov a odhadov pravdepodobností.</p>

<div id="content" class="grid"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "TVOJ_SUPABASE_URL",
  "TVOJ_SUPABASE_ANON_KEY"
);

// 🔒 AUTH GUARD
async function protect() {
  const { data } = await supabase.auth.getSession();

  if (!data.session) {
    window.location.href = "login.html";
  }
}

protect();

// 📦 DÁTA (zatiaľ statické – neskôr presunieš do Supabase)
const races = [
  {
    title: "Rovina 1700 m",
    time: "14:00",
    items: [
      ["ChatGPT", "6 SETINO (IRE); 8 BLUE LAGOON"],
      ["AI 2", "6 SETINO (IRE); 8 BLUE LAGOON"],
      ["AI 3", "8 BLUE LAGOON; 2 EMILY IN BERLIN (GB)"],
      ["Deep research", "SETINO 72%, BLUE LAGOON 55%"]
    ]
  },
  {
    title: "Prútené prekážky 3600 m",
    time: "14:30",
    items: [
      ["ChatGPT", "2 KUBIK (FR); 1 OSBOURNE (IRE)"],
      ["AI 2", "2 KUBIK (FR); 1 OSBOURNE (IRE)"],
      ["AI 3", "3 SNOWMAN ENEMY (IRE); 2 KUBIK (FR)"],
      ["Deep research", "KUBIK 78%, OSBOURNE 45%"]
    ]
  }
];

// 🧠 RENDER
const container = document.getElementById("content");

races.forEach(r => {
  const el = document.createElement("section");
  el.className = "card";

  el.innerHTML = `
    <div class="title">
      <span class="badge">${r.title}</span>
      <span class="badge">${r.time}</span>
    </div>

    <table>
      <tr><th>Zdroj</th><th>Favoriti</th></tr>
      ${r.items.map(i => `
        <tr>
          <td class="${i[0]==='Deep research' ? 'dr':'ai'}">${i[0]}</td>
          <td>${i[1]}</td>
        </tr>
      `).join('')}
    </table>
  `;

  container.appendChild(el);
});
</script>

</body>
</html>
