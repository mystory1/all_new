<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Účet</title>
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:#111;color:#fff}
    .wrap{width:100%;max-width:460px}.card{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:20px;position:relative;z-index:1}
    .tabs{display:flex;gap:10px;margin-bottom:14px;position:relative;z-index:5}.tab{flex:1;position:relative;z-index:6;pointer-events:auto;border:1px solid #444;background:#222;color:#fff;border-radius:10px;padding:12px;cursor:pointer;font-weight:700}.tab.active{background:#2563eb}
    .panel{display:none}.panel.active{display:block}input{width:100%;padding:12px;border-radius:10px;border:1px solid #444;background:#0f0f0f;color:#fff;margin-bottom:12px}button.submit{width:100%;padding:12px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}.msg{margin-top:12px;min-height:20px;white-space:pre-wrap;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tabs">
        <button class="tab active" id="loginTab" type="button">Prihlásenie</button>
        <button class="tab" id="signupTab" type="button">Registrácia</button>
      </div>
      <div class="panel active" id="loginPanel">
        <input id="loginUsername" placeholder="Meno">
        <input id="loginPassword" type="password" placeholder="Heslo">
        <button class="submit" id="loginBtn" type="button">Prihlásiť sa</button>
      </div>
      <div class="panel" id="signupPanel">
        <input id="signupUsername" placeholder="Meno">
        <input id="signupPassword" type="password" placeholder="Heslo">
        <button class="submit" id="signupBtn" type="button">Registrovať</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const msg=document.getElementById('msg')
    const loginTab=document.getElementById('loginTab'), signupTab=document.getElementById('signupTab')
    const loginPanel=document.getElementById('loginPanel'), signupPanel=document.getElementById('signupPanel')
    function setMode(m){ loginTab.classList.toggle('active',m==='login'); signupTab.classList.toggle('active',m==='signup'); loginPanel.classList.toggle('active',m==='login'); signupPanel.classList.toggle('active',m==='signup'); msg.textContent='mode='+m }
    loginTab.addEventListener('click',()=>setMode('login'))
    signupTab.addEventListener('click',()=>setMode('signup'))
    document.getElementById('signupBtn').addEventListener('click',()=>{ msg.textContent='signup click' })
    document.getElementById('loginBtn').addEventListener('click',()=>{ msg.textContent='login click' })
  </script>
</body>
</html>
