<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #111111;
      --primary-hover: #222222;
      --danger: #b42318;
      --success: #027a48;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.07);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
    }

    h1 {
      font-size: clamp(2rem, 1.4rem + 2vw, 2.5rem);
      line-height: 1.1;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 28px;
      font-size: 0.98rem;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .field input:focus {
      border-color: #111;
      box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.08);
    }

    button {
      margin-top: 6px;
      border: 0;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease;
    }

    button:hover { background: var(--primary-hover); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .7; cursor: wait; }

    .message {
      min-height: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }

    .note {
      margin-top: 18px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Login</h1>
      <p class="subtitle">Prihlás sa menom alebo emailom a heslom.</p>

      <form id="loginForm">
        <div class="field">
          <label for="identifier">Meno alebo email</label>
          <input
            id="identifier"
            name="identifier"
            type="text"
            placeholder="Zadaj meno alebo email"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label for="password">Heslo</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Zadaj heslo"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" id="submitBtn">Prihlásiť sa</button>
        <p id="errorBox" class="message error"></p>
        <p id="successBox" class="message success"></p>
      </form>

      <p class="note">
        Doplň si <code>SUPABASE_URL</code> a <code>SUPABASE_ANON_KEY</code>.<br>
        Ak sa prihlasuješ menom, stránka najprv nájde email v tabuľke <code>profiles</code> a potom spraví login.
      </p>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://adpsrpsmfhokyqtvldki.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcHNycHNtZmhva3lxdHZsZGtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTM1ODYsImV4cCI6MjA5MDk4OTU4Nn0.CVrGlJpjtKTvIUJ2tHuYvDCs-TzNLHcO91R7GQJy6Y0";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    function looksLikeEmail(value) {
      return value.includes('@');
    }

    async function resolveEmail(identifier) {
      if (looksLikeEmail(identifier)) {
        return identifier;
      }

      const { data, error } = await supabaseClient
        .from('profiles')
        .select('email')
        .eq('username', identifier)
        .maybeSingle();

      if (error) {
        throw new Error('Nepodarilo sa nájsť používateľa podľa mena. Skontroluj RLS policy pre profiles.');
      }

      if (!data?.email) {
        throw new Error('Používateľ s týmto menom neexistuje.');
      }

      return data.email;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.textContent = '';
      successBox.textContent = '';
      submitBtn.disabled = true;

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const email = await resolveEmail(identifier);

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          throw new Error('Neplatné prihlasovacie údaje.');
        }

        successBox.textContent = 'Prihlásenie úspešné, presmerovávam...';

        setTimeout(() => {
          window.location.href = 'dummy.html';
        }, 700);
      } catch (err) {
        errorBox.textContent = err.message || 'Nastala chyba pri prihlásení.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
