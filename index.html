<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Účet</title>
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,Arial,sans-serif;background:#0d0d0d;color:#e5e7eb}
    .wrap{width:100%;max-width:460px}.card{background:#161616;border:1px solid #333;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.45);padding:28px 22px}
    h1{margin:0 0 18px;text-align:center}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.tab{border:1px solid #333;background:#222;color:#fff;border-radius:12px;padding:12px;cursor:pointer;font-weight:800}.tab.active{background:#2563eb;border-color:#2563eb}
    form{display:grid;gap:14px}.field{display:grid;gap:6px} label{font-size:14px;color:#cbd5e1} input{width:100%;border:1px solid #444;border-radius:12px;padding:12px;background:#0f0f0f;color:#e5e7eb;font:inherit}
    button.submit{border:0;border-radius:12px;padding:12px 14px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer}.msg{min-height:20px;font-size:14px}.error{color:#f87171}.success{color:#34d399}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Účet</h1>
      <div class="tabs">
        <button class="tab active" id="loginTab">Prihlásenie</button>
        <button class="tab" id="signupTab">Registrácia</button>
      </div>
      <form id="authForm">
        <div class="field"><label for="username">Meno</label><input id="username" type="text" required autocomplete="username" /></div>
        <div class="field"><label for="password">Heslo</label><input id="password" type="password" required autocomplete="current-password" /></div>
        <button class="submit" type="submit" id="submitBtn">Prihlásiť sa</button>
        <div id="msg" class="msg"></div>
      </form>
    </div>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm'

    const SUPABASE_URL = 'https://adpsrpsmfhokyqtvldki.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcHNycHNtZmhva3lxdHZsZGtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTM1ODYsImV4cCI6MjA5MDk4OTU4Nn0.CVrGlJpjtKTvIUJ2tHuYvDCs-TzNLHcO91R7GQJy6Y0'
  
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const loginTab = document.getElementById('loginTab')
    const signupTab = document.getElementById('signupTab')
    const submitBtn = document.getElementById('submitBtn')
    const msg = document.getElementById('msg')
    const form = document.getElementById('authForm')
    let mode = 'login'

    function setMode(next){
      mode = next
      loginTab.classList.toggle('active', mode==='login')
      signupTab.classList.toggle('active', mode==='signup')
      submitBtn.textContent = mode==='signup' ? 'Registrovať' : 'Prihlásiť sa'
      msg.textContent = ''
      msg.className = 'msg'
    }

    loginTab.onclick = () => setMode('login')
    signupTab.onclick = () => setMode('signup')

    async function loadUser(username){
      const { data, error } = await supabase.from('users').select('*').eq('username', username).maybeSingle()
      if (error) throw error
      return data
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      submitBtn.disabled = true
      msg.textContent = ''
      msg.className = 'msg'

      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value

      try {
        if (!username || !password) throw new Error('Vyplň meno a heslo.')

        if (mode === 'signup') {
          const existing = await loadUser(username)
          if (existing) throw new Error('Toto meno už existuje.')

          const passwordHash = await bcrypt.hash(password, 10)
          const { error } = await supabase.from('users').insert({ username, password_hash: passwordHash })
          if (error) throw error

          msg.textContent = 'Registrácia úspešná.'
          msg.classList.add('success')
          form.reset()
        } else {
          const user = await loadUser(username)
          if (!user) throw new Error('Používateľ neexistuje.')

          const ok = await bcrypt.compare(password, user.password_hash)
          if (!ok) throw new Error('Neplatné prihlasovacie údaje.')

          localStorage.setItem('session_user', JSON.stringify({ id: user.id, username: user.username }))
          msg.textContent = 'Prihlásenie úspešné.'
          msg.classList.add('success')
          setTimeout(() => {
          window.location.href = './0.html';
        }, 700);
        }
      } catch (err) {
        msg.textContent = err.message || 'Nastala chyba.'
        msg.classList.add('error')
      } finally {
        submitBtn.disabled = false
      }
    })
  </script>
</body>
</html>
