<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Účet</title>
  <style>
    :root{--bg:#0a0a0a;--card:#111;--line:#2d2d2d;--line2:#444;--text:#f2f2f2;--muted:#a6a6a6;--accent:#8b8b8b;--accent2:#b5b5b5;--input:#0d0d0d}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#141414 0%,#0a0a0a 58%);color:var(--text)}
    .wrap{width:100%;max-width:420px}
    .card{background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.45);backdrop-filter:blur(8px)}
    .brand{font-size:22px;font-weight:800;letter-spacing:.2px;color:#fff;margin-bottom:16px;text-align:center}
    .tabs{display:flex;gap:8px;margin-bottom:16px;padding:4px;background:#0d0d0d;border:1px solid var(--line);border-radius:14px}
    .tab{flex:1;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:10px;padding:11px 12px;cursor:pointer;font-weight:700;transition:.18s ease}
    .tab:hover{color:#fff;background:#151515}
    .tab.active{background:#f2f2f2;color:#111;border-color:#f2f2f2}
    .panel{display:none}.panel.active{display:block}
    .field{margin-bottom:12px}
    input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--input);color:var(--text);outline:none;transition:.15s ease;font-size:15px}
    input::placeholder{color:#7f7f7f}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,139,139,.12)}
    button.submit{width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:12px;background:#e5e5e5;color:#111;font-weight:800;cursor:pointer;transition:.15s ease;font-size:15px}
    button.submit:hover{background:var(--accent2)}
    .msg{margin-top:14px;min-height:22px;white-space:pre-wrap;font-size:14px;color:var(--muted);line-height:1.4;text-align:center}
    .hint{margin-top:10px;text-align:center;color:#7f7f7f;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">Účet</div>
      <div class="tabs">
        <button class="tab active" id="loginTab" type="button">Prihlásenie</button>
        <button class="tab" id="signupTab" type="button">Registrácia</button>
      </div>
      <div class="panel active" id="loginPanel">
        <div class="field"><input id="loginUsername" placeholder="Meno"></div>
        <div class="field"><input id="loginPassword" type="password" placeholder="Heslo"></div>
        <button class="submit" id="loginBtn" type="button">Prihlásiť sa</button>
      </div>
      <div class="panel" id="signupPanel">
        <div class="field"><input id="signupUsername" placeholder="Meno"></div>
        <div class="field"><input id="signupPassword" type="password" placeholder="Heslo"></div>
        <button class="submit" id="signupBtn" type="button">Registrovať</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.addEventListener('load', () => {
      const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.APP_CONFIG;
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const msg=document.getElementById('msg')
      const loginTab=document.getElementById('loginTab'), signupTab=document.getElementById('signupTab')
      const loginPanel=document.getElementById('loginPanel'), signupPanel=document.getElementById('signupPanel')
      const loginUsername=document.getElementById('loginUsername'), loginPassword=document.getElementById('loginPassword')
      const signupUsername=document.getElementById('signupUsername'), signupPassword=document.getElementById('signupPassword')
      const loginBtn=document.getElementById('loginBtn'), signupBtn=document.getElementById('signupBtn')
      function setMode(m){ loginTab.classList.toggle('active',m==='login'); signupTab.classList.toggle('active',m==='signup'); loginPanel.classList.toggle('active',m==='login'); signupPanel.classList.toggle('active',m==='signup'); msg.textContent='' }
      loginTab.addEventListener('click',()=>setMode('login'))
      signupTab.addEventListener('click',()=>setMode('signup'))
      async function loadUser(u){ const {data,error}=await supabase.from('profiles').select('*').eq('username',u).maybeSingle(); if(error) throw error; return data }
      async function sendApprovalEmail(username){
        const endpoint = window.APP_CONFIG?.APPROVAL_EMAIL_ENDPOINT
        const apiKey = window.APP_CONFIG?.APPROVAL_EMAIL_KEY
        if(!endpoint) return
        await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          },
          body: JSON.stringify({
            to: 'patrikmolnar1@gmail.com',
            subject: 'Nový klient čaká na schválenie',
            message: `Nový klient "${username}" sa zaregistroval a čaká na schválenie.`
          })
        })
      }
      async function doSignup(){
        try{
          const u=signupUsername.value.trim()
          const p=signupPassword.value
          if(!u||!p){ msg.textContent='Vyplň meno a heslo.'; return }
          const existing=await loadUser(u)
          if(existing){ msg.textContent='Toto meno už existuje.'; return }
          const { error } = await supabase.from('profiles').insert({ username:u, email:'', password_hash:p, role:'user', approved:false, allowed_pages:[] }).select()
          if(error) throw error
          try { await sendApprovalEmail(u) } catch(e) {}
          msg.textContent='Registrácia úspešná. Počkaj na schválenie adminom.'
        }catch(e){ msg.textContent='ERR '+(e.message||e) }
      }
      async function doLogin(){
        try{
          const u=loginUsername.value.trim()
          const p=loginPassword.value
          if(!u||!p){ msg.textContent='Vyplň meno a heslo.'; return }
          const user=await loadUser(u)
          if(!user){ msg.textContent='Používateľ neexistuje.'; return }
          if(!user.approved){ msg.textContent='Účet čaká na schválenie administrátorom.'; return }
          if(user.password_hash !== p){ msg.textContent='Neplatné prihlasovacie údaje.'; return }
          const session = { id:user.id, username:user.username, email:user.email, role:user.role||'user', approved: !!user.approved, allowed_pages:user.allowed_pages||[] }
          localStorage.setItem('session_user', JSON.stringify(session))
          msg.textContent='Prihlásenie úspešné.'
          location.assign('./0.html')
        }catch(e){ msg.textContent='ERR '+(e.message||e) }
      }
      loginBtn.addEventListener('click', doLogin)
      signupBtn.addEventListener('click', doSignup)
      loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
      signupPassword.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup() })
    })
  </script>
</body>
</html>
