<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Projekty</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#0d0d0d;color:#e5e7eb}
    .app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
    .sidebar{background:#111;border-right:1px solid #2a2a2a;padding:18px;display:flex;flex-direction:column;gap:14px}
    .brand{font-size:24px;font-weight:900;color:#fff}
    .sidebar .actions{display:flex;gap:10px;flex-wrap:wrap}
    .sidebar button,.topbar button{border:0;border-radius:12px;padding:11px 14px;font:inherit;font-weight:800;cursor:pointer}
    .primary{background:#2563eb;color:#fff}.success{background:#16a34a;color:#fff}.secondary{background:#2b2b2b;color:#e5e7eb}
    .project-list{display:flex;flex-direction:column;gap:8px;overflow:auto}
    .project-item{padding:12px 14px;border:1px dashed #444;border-radius:14px;background:#181818;color:#e5e7eb;text-align:left}
    .project-item.active{background:#262626;border-color:#777}
    .content{padding:18px;display:flex;flex-direction:column;gap:16px;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #2a2a2a;padding-bottom:12px}
    .title{font-size:28px;font-weight:900}
    .project-label{color:#9ca3af;font-size:14px}
    .board{display:grid;gap:18px;grid-template-columns:repeat(1,minmax(0,1fr))}
    .board.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.board.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.board.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.board.cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}.board.cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}
    @media(max-width:1200px){.board.cols-6,.board.cols-5,.board.cols-4,.board.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid #2a2a2a}.board{grid-template-columns:1fr !important}}
    .column{min-height:420px;border-radius:18px;padding:14px;display:flex;flex-direction:column;background:#181818;border:1px dashed rgba(255,255,255,.18);box-shadow:0 8px 22px rgba(0,0,0,.35);position:relative;overflow:hidden}
    .column:not(:last-child)::after{content:"";position:absolute;top:0;bottom:0;right:-11px;border-right:6px dashed #666}
    .column-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:3px dashed rgba(255,255,255,.22)}
    .column-title{flex:1;padding:10px 12px;border-radius:22px 12px 12px 22px;color:#fff;font-weight:900;outline:none;border:1px solid rgba(255,255,255,.15)}
    .icon-btn{width:32px;height:32px;padding:0;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff}
    .tasks{display:flex;flex-direction:column;gap:8px;min-height:120px;overflow:auto;padding-right:4px}
    .task{background:#222;border-radius:12px;padding:12px;border:1px solid #333;border-left:6px solid #3b82f6;cursor:pointer;transition:.2s}
    .task:hover{background:#2b2b2b;transform:translateY(-1px)}
    .task.dragging{opacity:.55;transform:rotate(2deg) scale(.97)}
    .task-top{display:flex;justify-content:space-between;align-items:center;gap:8px}.task-id{font-size:11px;color:#9ca3af;font-weight:800;background:#111;padding:2px 6px;border-radius:4px;border:1px solid #444}.task-name{font-weight:900;margin-top:6px;color:#f3f4f6;word-break:break-word}.task-details{display:none;margin-top:8px;padding:10px;background:#151515;border:1px dashed #444;border-radius:10px;font-size:12px;color:#cbd5e1;white-space:pre-wrap;word-break:break-word}.task.open .task-details{display:block}.task-actions{display:flex;gap:4px}.task-actions .icon-btn{width:26px;height:26px;font-size:12px;border-radius:6px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:20;backdrop-filter:blur(6px)}.modal-backdrop.show{display:flex}.modal{background:#161616;border:1px solid #333;width:min(600px,100%);border-radius:18px;padding:20px;box-shadow:0 20px 40px rgba(0,0,0,.45)}.modal h3{margin:0 0 16px;color:#fff}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.field label{color:#cbd5e1;font-size:14px}.field input,.field select,.field textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #444;background:#0f0f0f;color:#e5e7eb;font:inherit}.field textarea{min-height:110px;resize:vertical}
    .colors{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px}.swatch{width:38px;height:38px;border-radius:50%;border:3px solid #333;cursor:pointer}.swatch.selected{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.2)}.color-blue{background:#3b82f6}.color-green{background:#22c55e}.color-orange{background:#f59e0b}.color-purple{background:#a855f7}.color-red{background:#ef4444}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Moje projekty</div>
    <div class="actions"><button class="primary" id="newProjectBtn">Nový projekt</button><button class="secondary" id="renameProjectBtn">Upraviť</button><button class="secondary" id="deleteProjectBtn">Zmazať</button></div>
    <div id="projectList" class="project-list"></div>
  </aside>
  <main class="content">
    <div class="topbar">
      <div>
        <div class="title" id="currentProjectTitle">Projekt</div>
        <div class="project-label" id="currentProjectLabel">Stavy a úlohy</div>
      </div>
      <div class="actions">
        <button class="secondary" id="logoutBtn">Odhlásiť sa</button>
        <button class="primary" id="openTaskBtn">Pridať úlohu</button>
        <button class="success" id="openColumnBtn">Pridať stav</button>
      </div>
    </div>
    <div id="board" class="board"></div>
  </main>
</div>
<div id="projectModal" class="modal-backdrop"><div class="modal"><h3>Projekt</h3><div class="field"><label>Názov projektu</label><input id="projectName" type="text" placeholder="Napr. Web app" /></div><div class="modal-actions"><button class="secondary" id="closeProjectBtn">Zrušiť</button><button class="primary" id="saveProjectBtn">Uložiť</button></div></div></div>
<div id="taskModal" class="modal-backdrop"><div class="modal"><h3>Úloha</h3><div class="field"><label>Stav</label><select id="taskStatus"></select></div><div class="field"><label>Názov úlohy</label><input id="taskName" type="text" placeholder="Zadaj názov úlohy" /></div><div class="field"><label>Poznámka</label><textarea id="taskNote" placeholder="Voliteľná poznámka"></textarea></div><div class="modal-actions"><button class="secondary" id="closeTaskBtn">Zrušiť</button><button class="primary" id="saveTaskBtn">Uložiť</button></div></div></div>
<div id="columnModal" class="modal-backdrop"><div class="modal"><h3>Stav</h3><div class="field"><label>Názov stavu</label><input id="columnName" type="text" placeholder="Napr. Testovanie" /></div><div class="field"><label>Farba stavu</label><div class="colors" id="colorPicker"><button class="swatch color-blue" onclick="selectColor(0)"></button><button class="swatch color-green" onclick="selectColor(1)"></button><button class="swatch color-orange" onclick="selectColor(2)"></button><button class="swatch color-purple" onclick="selectColor(3)"></button><button class="swatch color-red" onclick="selectColor(4)"></button></div></div><div class="modal-actions"><button class="secondary" id="closeColumnBtn">Zrušiť</button><button class="success" id="saveColumnBtn">Pridať</button></div></div></div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const SUPABASE_URL = 'https://adpsrpsmfhokyqtvldki.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcHNycHNtZmhva3lxdHZsZGtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTM1ODYsImV4cCI6MjA5MDk4OTU4Nn0.CVrGlJpjtKTvIUJ2tHuYvDCs-TzNLHcO91R7GQJy6Y0'
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  const COLORS = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444']
  let selectedColor=0, editingTask=null, editingProjectId=null, state={projects:[],activeProjectId:null}
  const uid = (p='') => Math.random().toString(36).slice(2,10)+p
  function esc(s=''){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function shortId(id){return id.toString().slice(0,8)}
  function fmt(ts){return new Intl.DateTimeFormat('sk-SK',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(ts))}
  function selectColor(i){selectedColor=i; document.querySelectorAll('.swatch').forEach((b,idx)=>b.classList.toggle('selected', idx===i))}
  function project(){return state.projects.find(p=>p.id===state.activeProjectId)}
  function saveLocal(){localStorage.setItem('kanban_projects_v1', JSON.stringify(state))}
  function getSessionUser(){ const raw = localStorage.getItem('session_user'); return raw ? JSON.parse(raw) : null }
  async function loadAll(){ const user = getSessionUser(); if(!user){ window.location.replace('login.html'); return } const {data: projects, error: pe} = await db.from('projects').select('*').eq('owner_id', user.id).order('created_at',{ascending:true}); if(pe) return alert(pe.message); const {data: columns, error: ce} = await db.from('columns').select('*').eq('owner_id', user.id).order('position',{ascending:true}); if(ce) return alert(ce.message); const {data: tasks, error: te} = await db.from('tasks').select('*').eq('owner_id', user.id).order('position',{ascending:true}); if(te) return alert(te.message); state.projects = (projects||[]).map(p=>({ ...p, columns: (columns||[]).filter(c=>c.project_id===p.id).map(c=>({ ...c, tasks: (tasks||[]).filter(t=>t.column_id===c.id) })) })); if(!state.projects.length){ const p = await createDefaultProject(user); state.projects=[p] } state.activeProjectId = state.activeProjectId && state.projects.some(p=>p.id===state.activeProjectId) ? state.activeProjectId : state.projects[0].id; saveLocal(); render() }
  async function createDefaultProject(user){ const {data:p, error} = await db.from('projects').insert({name:'Projekt 1', owner_id:user.id}).select().single(); if(error) throw error; const cols = [{title:'Todo', color:0, position:0, project_id:p.id, owner_id:user.id},{title:'In Progress', color:1, position:1, project_id:p.id, owner_id:user.id},{title:'Done', color:2, position:2, project_id:p.id, owner_id:user.id}]; const {data: insertedCols, error: ce} = await db.from('columns').insert(cols).select('*'); if(ce) throw ce; return {...p, columns: insertedCols.map(c=>({...c, tasks:[]}))} }
  async function createProject(){ const user = getSessionUser(); if(!user) return alert('Nie si prihlásený.'); const name = document.getElementById('projectName').value.trim() || 'Nový projekt'; const {data, error} = await db.from('projects').insert({ name, owner_id: user.id }).select().single(); if(error) return alert(error.message); const cols = [{title:'Todo', color:0, position:0, project_id:data.id, owner_id: user.id},{title:'In Progress', color:1, position:1, project_id:data.id, owner_id: user.id},{title:'Done', color:2, position:2, project_id:data.id, owner_id: user.id}]; const {data: insertedCols, error: ce} = await db.from('columns').insert(cols).select('*'); if(ce) return alert(ce.message); state.projects.unshift({...data, columns: insertedCols.map(c=>({...c, tasks:[]}))}); state.activeProjectId = data.id; saveLocal(); render(); closeProjectModal() }
  async function updateProjectName(){ const p = project(); if(!p) return; const name = document.getElementById('projectName').value.trim() || 'Nový projekt'; const {error} = await db.from('projects').update({name}).eq('id', p.id); if(error) return alert(error.message); p.name = name; saveLocal(); render(); closeProjectModal() }
  async function deleteProject(){ const p = project(); if(!p) return; if(!confirm('Naozaj zmazať celý projekt aj so stavmi a úlohami?')) return; const {error} = await db.from('projects').delete().eq('id', p.id); if(error) return alert(error.message); state.projects = state.projects.filter(x=>x.id!==p.id); state.activeProjectId = state.projects[0]?.id || null; saveLocal(); render() }
  function renderProjectList(){const list=document.getElementById('projectList'); list.innerHTML=''; state.projects.forEach(p=>{const b=document.createElement('button'); b.className='project-item'+(p.id===state.activeProjectId?' active':''); b.textContent=p.name; b.onclick=()=>{state.activeProjectId=p.id; saveLocal(); render()}; list.appendChild(b)})}
  function openProjectModal(name=''){document.getElementById('projectName').value=name; document.getElementById('projectModal').classList.add('show')}
  function closeProjectModal(){document.getElementById('projectModal').classList.remove('show')}
  function openTaskModal(colId=null,task=null){editingTask=task?{colId,taskId:task.id}:null; document.getElementById('taskStatus').value=colId||project().columns[0]?.id||''; document.getElementById('taskName').value=task?.name||''; document.getElementById('taskNote').value=task?.note||''; document.getElementById('taskModal').classList.add('show')}
  function closeTaskModal(){document.getElementById('taskModal').classList.remove('show')}
  function openColumnModal(){document.getElementById('columnModal').classList.add('show')}
  function closeColumnModal(){document.getElementById('columnModal').classList.remove('show')}
  async function editColumn(colId){ const p=project(); const idx=p.columns.findIndex(x=>x.id===colId); const col=p.columns[idx]; const title=prompt('Názov stavu',col.title); if(title===null) return; const order=prompt(`Poradie stavu (1–${p.columns.length})`, String(idx+1)); let newIdx=(parseInt(order||String(idx+1),10)||1)-1; newIdx=Math.max(0,Math.min(p.columns.length-1,newIdx)); const colorTxt=prompt('Farba stavu: blue, green, orange, purple, red', ['blue','green','orange','purple','red'][col.color]); const map={blue:0,green:1,orange:2,purple:3,red:4}; if(colorTxt && map[colorTxt.toLowerCase()]!==undefined) col.color=map[colorTxt.toLowerCase()]; col.title=title.trim()||'Bez názvu'; p.columns.splice(idx,1); p.columns.splice(newIdx,0,col); const {error} = await db.from('columns').update({title:col.title,color:col.color,position:newIdx}).eq('id', col.id); if(error) return alert(error.message); const ops = p.columns.map((c,i)=>db.from('columns').update({position:i}).eq('id', c.id)); await Promise.all(ops); saveLocal(); render() }
  async function addOrUpdateTask(){ const p=project(); const colId=document.getElementById('taskStatus').value; const name=document.getElementById('taskName').value.trim(); const note=document.getElementById('taskNote').value.trim(); if(!colId||!name) return alert('Zadaj názov úlohy a vyber stav.'); if(editingTask){ const oldCol=p.columns.find(c=>c.id===editingTask.colId); const idx=oldCol.tasks.findIndex(t=>t.id===editingTask.taskId); if(idx!==-1){ const task=oldCol.tasks[idx]; task.name=name; task.note=note; if(editingTask.colId!==colId){ oldCol.tasks.splice(idx,1); p.columns.find(c=>c.id===colId).tasks.push(task) } const {error} = await db.from('tasks').update({name,note,column_id:colId}).eq('id', task.id); if(error) return alert(error.message) } } else { const target = p.columns.find(c=>c.id===colId); const payload = {name,note,column_id:colId,position:target.tasks.length, owner_id: getSessionUser().id}; const {data,error} = await db.from('tasks').insert(payload).select().single(); if(error) return alert(error.message); target.tasks.push(data) } saveLocal(); render(); closeTaskModal() }
  async function addColumn(){ const p=project(); const name=document.getElementById('columnName').value.trim()||'Nový stav'; if(p.columns.length>=8) return alert('Maximálne 8 stavov.'); const payload = {title:name,color:selectedColor,project_id:p.id,position:p.columns.length, owner_id:getSessionUser().id}; const {data,error} = await db.from('columns').insert(payload).select().single(); if(error) return alert(error.message); p.columns.push({...data, tasks:[]}); document.getElementById('columnName').value=''; saveLocal(); render(); closeColumnModal() }
  async function deleteColumn(colId){ const p=project(); const col = p.columns.find(c=>c.id===colId); if(!col) return; if(!confirm('Naozaj zmazať stav a všetky úlohy?')) return; const {error} = await db.from('columns').delete().eq('id', colId); if(error) return alert(error.message); p.columns = p.columns.filter(x=>x.id!==colId); if(p.columns.length===0){ const nc={id:uid('c'),title:'Todo',color:0,tasks:[],project_id:p.id,position:0}; await db.from('columns').insert({id:nc.id,title:nc.title,color:nc.color,project_id:p.id,position:0, owner_id:getSessionUser().id}); p.columns=[nc] } saveLocal(); render() }
  async function deleteTask(taskId,colId){ const p=project(); const col = p.columns.find(c=>c.id===colId); if(!col) return; const {error} = await db.from('tasks').delete().eq('id', taskId); if(error) return alert(error.message); col.tasks = col.tasks.filter(t=>t.id!==taskId); saveLocal(); render() }
  async function dropTaskToColumn(data,targetColId){ const p=project(); const source=p.columns.find(c=>c.id===data.fromCol); const target=p.columns.find(c=>c.id===targetColId); if(!source||!target) return; const idx=source.tasks.findIndex(t=>t.id===data.taskId); if(idx===-1) return; const [task]=source.tasks.splice(idx,1); target.tasks.push(task); const {error} = await db.from('tasks').update({column_id:targetColId,position:target.tasks.length-1}).eq('id', task.id); if(error) return alert(error.message); saveLocal(); render() }
  function render(){ const p=project(); if(!p){ document.getElementById('currentProjectTitle').textContent='Žiadny projekt'; document.getElementById('board').innerHTML=''; return } document.getElementById('currentProjectTitle').textContent=p.name; document.getElementById('currentProjectLabel').textContent=`Projekt ID: ${shortId(p.id)} • ${p.columns.length} stavov`; renderProjectList(); const board=document.getElementById('board'); board.className='board cols-'+Math.min(p.columns.length,6); board.innerHTML=''; const status=document.getElementById('taskStatus'); status.innerHTML='<option value="">Vyber stav</option>'; p.columns.forEach(col=>{const opt=document.createElement('option'); opt.value=col.id; opt.textContent=col.title; status.appendChild(opt); const column=document.createElement('div'); column.className='column'; column.innerHTML=`<div class="column-header"><div class="column-title" contenteditable="true" style="background:${COLORS[col.color]}">${esc(col.title)}</div><button class="icon-btn edit-column-btn" title="Upraviť stav">✎</button><button class="icon-btn delete-column-btn" title="Zmazať stav">✕</button></div><div class="tasks"></div>`; column.querySelector('.column-title').onblur=async e=>{col.title=e.target.textContent.trim()||'Bez názvu'; await db.from('columns').update({title:col.title}).eq('id', col.id); saveLocal(); render()}; column.querySelector('.edit-column-btn').onclick=()=>editColumn(col.id); column.querySelector('.delete-column-btn').onclick=()=>deleteColumn(col.id); column.ondragover=e=>{e.preventDefault(); e.dataTransfer.dropEffect='move'}; column.ondrop=e=>{e.preventDefault(); const data=JSON.parse(e.dataTransfer.getData('text/plain')); if(data) dropTaskToColumn(data,col.id)}; const tasksWrap=column.querySelector('.tasks'); col.tasks.forEach((task,index)=>{const taskEl=document.createElement('div'); taskEl.className='task'; taskEl.draggable=true; taskEl.innerHTML=`<div class="task-top"><div class="task-id">#${shortId(task.id)}</div><div class="task-actions"><button class="icon-btn edit-task-btn" title="Upraviť">✎</button><button class="icon-btn delete-task-btn" title="Zmazať">✕</button></div></div><div class="task-name">${index+1}. ${esc(task.name)}</div><div class="task-details">Vytvorené: ${fmt(task.created_at||task.createdAt||Date.now())}<br><br>Poznámka: ${task.note?esc(task.note):'—'}</div>`; taskEl.onclick=e=>{if(!e.target.closest('.icon-btn')) taskEl.classList.toggle('open')}; taskEl.ondragstart=e=>{taskEl.classList.add('dragging'); e.dataTransfer.setData('text/plain',JSON.stringify({taskId:task.id,fromCol:col.id}))}; taskEl.ondragend=()=>taskEl.classList.remove('dragging'); taskEl.querySelector('.edit-task-btn').onclick=()=>openTaskModal(col.id,task); taskEl.querySelector('.delete-task-btn').onclick=()=>deleteTask(task.id,col.id); tasksWrap.appendChild(taskEl)}); board.appendChild(column)}) }
  async function init(){ selectColor(0); await loadAll(); document.getElementById('newProjectBtn').onclick=()=>openProjectModal(); document.getElementById('renameProjectBtn').onclick=()=>{editingProjectId=state.activeProjectId; openProjectModal(project()?.name||'')}; document.getElementById('deleteProjectBtn').onclick=deleteProject; document.getElementById('logoutBtn').onclick=async ()=>{ try{ localStorage.removeItem('session_user'); localStorage.removeItem('kanban_projects_v1'); await db.auth.signOut() } finally { window.location.replace('login.html') } }; document.getElementById('openTaskBtn').onclick=()=>openTaskModal(); document.getElementById('openColumnBtn').onclick=openColumnModal; document.getElementById('closeTaskBtn').onclick=closeTaskModal; document.getElementById('closeColumnBtn').onclick=closeColumnModal; document.getElementById('closeProjectBtn').onclick=closeProjectModal; document.getElementById('saveTaskBtn').onclick=addOrUpdateTask; document.getElementById('saveColumnBtn').onclick=addColumn; document.getElementById('saveProjectBtn').onclick=()=>editingProjectId?updateProjectName():createProject(); document.getElementById('taskModal').onclick=e=>{if(e.target.id==='taskModal') closeTaskModal()}; document.getElementById('columnModal').onclick=e=>{if(e.target.id==='columnModal') closeColumnModal()}; document.getElementById('projectModal').onclick=e=>{if(e.target.id==='projectModal') closeProjectModal()} }
  init()
</script>
</body>
</html>
