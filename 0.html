<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        h1 { margin-bottom: 24px; font-size: 2rem; color: #f0f0f0; }
        .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; min-height: 64px; text-decoration: none; color: #fff; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; font-size: 1.1rem; font-weight: 600; transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease; user-select: none; }
        .nav-btn:hover { background: #2a2a2a; border-color: #555; transform: translateY(-2px); }
        .nav-btn:active { transform: translateY(0); }
        @media (max-width: 800px) { .buttons { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .buttons { grid-template-columns: 1fr; } h1 { font-size: 1.6rem; } .nav-btn { min-height: 58px; } }
    </style>
</head>
<body>
    <main class="container">
        <div class="buttons">
            <a class="nav-btn" href="1.html">1</a>
            <a class="nav-btn" href="2.html">2</a>
            <a class="nav-btn" href="3.html">3</a>
            <a class="nav-btn" href="4.html">4</a>
            <a class="nav-btn" href="5.html">5</a>
        </div>
    </main>
    <script>
      function checkAuth(){
        const raw = localStorage.getItem('session_user')
        if(!raw){ window.location.replace('login.html'); return }
        try { const user = JSON.parse(raw); if(!user || !user.id) throw new Error('bad'); } catch(e) { localStorage.removeItem('session_user'); window.location.replace('login.html'); }
      }
      checkAuth()
    </script>
</body>
</html>
