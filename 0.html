<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0} body{min-height:100vh;background:#000;color:#fff;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}.container{width:100%;max-width:600px;text-align:center} .buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.nav-btn{display:flex;align-items:center;justify-content:center;min-height:64px;text-decoration:none;color:#fff;background:#1a1a1a;border:1px solid #333;border-radius:12px;font-size:1.1rem;font-weight:600;transition:transform .2s,background .2s,border-color .2s;user-select:none}.nav-btn:hover{background:#2a2a2a;border-color:#555;transform:translateY(-2px)} @media(max-width:800px){.buttons{grid-template-columns:repeat(2,1fr)}} @media(max-width:480px){.buttons{grid-template-columns:1fr}.nav-btn{min-height:58px}}
  </style>
</head>
<body>
  <main class="container"><div class="buttons"><a class="nav-btn" href="1.html">1</a><a class="nav-btn" href="2.html">2</a><a class="nav-btn" href="3.html">3</a><a class="nav-btn" href="4.html">4</a><a class="nav-btn" href="5.html">5</a></div></main>
  <script>
    const me = JSON.parse(localStorage.getItem('session_user') || 'null')
    if(!me) location.replace('index.html')
    const allowed = me.role === 'admin' ? ['0.html','1.html','2.html','3.html','4.html','5.html','admin.html'] : (me.allowed_pages || ['0.html'])
    if(!allowed.includes('0.html')) location.replace('index.html')
  </script>
</body>
</html>
