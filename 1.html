<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:Arial,sans-serif;padding:20px;min-height:100vh}
    .container{max-width:800px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    h1{color:#ccc}
    .nav-btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;text-decoration:none;background:#222;color:#fff;border:1px solid #333;border-radius:8px}
    .logout-btn{background:#ef4444;border:1px solid #b91c1c;color:#fff;cursor:pointer}
    .status{margin:10px 0 20px;padding:12px 14px;border:1px solid #333;border-radius:8px;background:#111;color:#bbb;min-height:22px}
    #noteTitleInput,#noteContentInput{width:100%;background:#111;color:#fff;border:1px solid #333;padding:15px;font-size:16px;border-radius:8px;outline:none}
    #noteTitleInput{margin-bottom:10px;height:50px}
    #noteContentInput{height:120px;resize:vertical}
    button{background:#444;color:#fff;border:none;padding:12px 24px;margin:10px 5px 0 0;cursor:pointer;border-radius:5px}
    button:hover{background:#555}
    .notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:30px}
    .note{background:#111;border:1px solid #333;padding:20px;border-radius:8px}
    .note h3{margin:0 0 10px 0;color:#ccc;font-size:18px;border-bottom:1px solid #333;padding-bottom:5px}
    .note .content{width:100%;background:transparent;color:#fff;border:none;resize:vertical;font-size:16px;min-height:80px;outline:none}
    .note .title{width:100%;background:transparent;color:#fff;border:none;font-size:15px;font-weight:700;margin-bottom:10px;outline:none}
    .note-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .delete-btn{background:#a00}.delete-btn:hover{background:#FF6666}.save-btn{background:#009933}.save-btn:hover{background:#0c0}.project-btn{background:#666}.project-btn:hover{background:#888}
    .divider{width:100%;height:15px;background:#FFFFFF;opacity:0.25;margin:25px 0 10px}
    .empty{margin-top:24px;padding:16px;border:1px solid #333;border-radius:8px;background:#111;color:#bbb}
    @media(max-width:600px){.notes-grid{grid-template-columns:1fr} body{padding:10px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Notes</h1>
      <a id="backToMenuBtn" class="nav-btn" href="0.html">Späť do menu</a>
      <button id="logoutBtn" class="nav-btn logout-btn" type="button">Odhlásiť sa</button>
    </div>
    <div id="status" class="status">Pripájam sa k databáze.</div>
    <input id="noteTitleInput" type="text" placeholder="Title">
    <textarea id="noteContentInput" placeholder="Poznámka"></textarea>
    <button id="addBtn" type="button">Add</button>
    <div class="divider"></div>
    <div id="notesList" class="notes-grid"></div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.addEventListener('load', () => {
      const cfg = window.APP_CONFIG || {};
      const statusEl = document.getElementById('status');
      const notesList = document.getElementById('notesList');
      const titleInput = document.getElementById('noteTitleInput');
      const contentInput = document.getElementById('noteContentInput');
      const addBtn = document.getElementById('addBtn');
      const me = JSON.parse(localStorage.getItem('session_user') || 'null');
      let authUser = null;
      const loadedIds = new Set();

      if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
        statusEl.textContent = 'Chýba config.js alebo Supabase kľúč.';
        console.error('Missing SUPABASE_URL or SUPABASE_ANON_KEY');
        return;
      }
      const supabase = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

      if (!me) return location.replace('index.html');
      const allowed = me.role === 'admin'
        ? ['0.html','1.html','2.html','3.html','4.html','5.html','admin.html','notes.html']
        : (me.allowed_pages || []);
      if (!(allowed.includes('notes.html') || allowed.includes('1.html'))) return location.replace('0.html');

      function setStatus(msg, isError = false) { statusEl.textContent = msg; statusEl.style.color = isError ? '#ff7b7b' : '#bbb'; }
      function generateTitle(title, content) { const cleanTitle = (title || '').trim(); if (cleanTitle) return cleanTitle; const clean = (content || '').trim().replace(/\s+/g, ' '); if (!clean) return 'Bez názvu'; return clean.slice(0, 30) + (clean.length > 30 ? '...' : ''); }
      function escHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

      async function restoreSession() {
        const saved = localStorage.getItem('sb-session');
        if (saved) {
          try {
            const session = JSON.parse(saved);
            if (session?.access_token && session?.refresh_token) {
              const { data, error } = await supabase.auth.setSession({ access_token: session.access_token, refresh_token: session.refresh_token });
              if (!error && data?.user) { authUser = data.user; return authUser; }
            }
          } catch (e) {}
        }
        const { data, error } = await supabase.auth.getSession();
        if (!error && data?.session?.user) {
          authUser = data.session.user;
          localStorage.setItem('sb-session', JSON.stringify(data.session));
          return authUser;
        }
        const uid = me.id || me.user_id || me.email || me.username || null;
        authUser = { id: uid || me.id || 'local-user' };
        return authUser;
      }
      async function getAuthUser() { return authUser || await restoreSession(); }

      async function loadNotes() {
        try {
          const user = await getAuthUser();
          setStatus('Načítavam poznámky...');
          const { data: notes, error } = await supabase.from('notes').select('id, title, content, created_at, user_id').eq('user_id', user.id).order('created_at', { ascending: false });
          if (error) throw error;
          const arr = notes || [];
          notesList.innerHTML = arr.length ? arr.map((note, index) => {
            const shownTitle = generateTitle(note.title, note.content);
            const escapedTitle = escHtml(note.title || '');
            const escapedContent = escHtml(note.content || '');
            return `
              <div class="note" data-note-id="${note.id}">
                <h3>#${index + 1} ${escHtml(shownTitle)}</h3>
                <input class="title" id="title-${note.id}" value="${escapedTitle}" placeholder="Názov poznámky">
                <textarea class="content" id="content-${note.id}">${escapedContent}</textarea>
                <div class="note-actions">
                  <button class="save-btn" type="button" data-action="save" data-id="${note.id}">Save</button>
                  <button class="delete-btn" type="button" data-action="delete" data-id="${note.id}">Delete</button>
                  <button class="project-btn" type="button" data-action="project" data-id="${note.id}">Create project</button>
                </div>
              </div>
            `;
          }).join('') : '<div class="empty">Zatiaľ tu nemáš žiadne poznámky.</div>';
          setStatus(arr.length ? `Načítané ${arr.length} poznámok.` : 'Zatiaľ tu nie sú žiadne poznámky.');
        } catch (error) {
          console.error('Chyba pri načítavaní:', error);
          setStatus('Chyba pri načítavaní: ' + (error?.message || error), true);
        }
      }

      async function addNote() {
        try {
          const user = await getAuthUser();
          const title = titleInput.value.trim();
          const content = contentInput.value.trim();
          if (!title && !content) { setStatus('Najprv vyplň názov alebo poznámku.', true); return; }
          setStatus('Ukladám poznámku...');
          const payload = { user_id: user.id, title, content };
          const { data, error } = await supabase.from('notes').insert([payload]).select('id, title, content, created_at, user_id');
          if (error) throw error;
          titleInput.value = ''; contentInput.value = '';
          setStatus('Poznámka uložená.');
          await loadNotes();
          console.log('Inserted:', data);
        } catch (error) {
          console.error('Chyba pri pridávaní:', error);
          setStatus('Chyba pri ukladaní: ' + (error?.message || error), true);
        }
      }

      async function updateNote(id) {
        try {
          const user = await getAuthUser();
          const title = document.getElementById(`title-${id}`)?.value.trim() || '';
          const content = document.getElementById(`content-${id}`)?.value.trim() || '';
          if (!title && !content) { setStatus('Poznámka nemôže byť úplne prázdna.', true); return; }
          setStatus('Ukladám zmeny...');
          const { error } = await supabase.from('notes').update({ title, content }).eq('id', id).eq('user_id', user.id);
          if (error) throw error;
          setStatus('Zmeny uložené.');
          await loadNotes();
        } catch (error) {
          console.error('Chyba pri aktualizácii:', error);
          setStatus('Chyba pri ukladaní zmien: ' + (error?.message || error), true);
        }
      }

      async function deleteNote(id) {
        if (!confirm('Naozaj vymazať?')) return;
        try {
          const user = await getAuthUser();
          setStatus('Mažem poznámku...');
          const { error } = await supabase.from('notes').delete().eq('id', id).eq('user_id', user.id);
          if (error) throw error;
          setStatus('Poznámka zmazaná.');
          await loadNotes();
        } catch (error) {
          console.error('Chyba pri mazaní:', error);
          setStatus('Chyba pri mazaní: ' + (error?.message || error), true);
        }
      }

      async function createProjectFromNote(id) {
        try {
          const user = await getAuthUser();
          const { data: note, error } = await supabase
            .from('notes')
            .select('id, title, content, created_at')
            .eq('id', id)
            .eq('user_id', user.id)
            .maybeSingle();

          if (error) throw error;
          if (!note) { setStatus('Poznámka sa nenašla.', true); return; }

          const projectName = generateTitle(note.title, note.content);
          const now = new Date().toISOString();
          const { error: projectError } = await supabase.from('projects').insert([{ name: projectName, owner_id: user.id, created_at: now, updated_at: now }]);
          if (projectError) throw projectError;
          setStatus('Kanban projekt vytvorený z poznámky.');
        } catch (error) {
          console.error('Chyba pri vytváraní projektu:', error);
          setStatus('Chyba pri vytváraní projektu: ' + (error?.message || error), true);
        }
      }

      notesList.addEventListener('input', (e) => {
        const ta = e.target.closest('.content');
        if (!ta) return;
        const card = ta.closest('.note');
        const h3 = card?.querySelector('h3');
        const titleInputEl = card?.querySelector('.title');
        const number = h3?.textContent.match(/^#\d+/)?.[0] || '';
        const title = titleInputEl?.value.trim();
        if (h3) h3.textContent = `${number} ${generateTitle(title, ta.value)}`;
      });

      notesList.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        if (btn.dataset.action === 'save') updateNote(id);
        if (btn.dataset.action === 'delete') deleteNote(id);
        if (btn.dataset.action === 'project') createProjectFromNote(id);
      });

      document.getElementById('noteContentInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) addNote();
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        try { await supabase.auth.signOut(); } catch (e) {}
        localStorage.removeItem('session_user');
        localStorage.removeItem('sb-session');
        location.replace('index.html');
      });

      addBtn.addEventListener('click', addNote);
      loadNotes();
    });
  </script>
</body>
</html>
