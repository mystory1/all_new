<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinema City 1+1</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,Arial,sans-serif;background:#0b0b0b;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 14px}
    .wrap{width:100%;max-width:560px}
    .top{font-size:14px;color:#9ca3af;margin-bottom:14px}
    .film{font-size:clamp(24px,6vw,38px);font-weight:800;line-height:1.15;margin-bottom:10px}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .box{background:#111;border:1px solid #1f2937;border-radius:14px;padding:14px 16px}
    .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;margin-bottom:6px}
    .value{font-size:18px;font-weight:700;color:#e5e7eb}
    .status{margin-top:12px;font-size:13px;color:#6b7280;min-height:18px}
    .status.err{color:#f87171}
    .status.ok{color:#4ade80}
    .note{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">Cinema City 1+1 Vivo:</div>
    <div id="film" class="film">Načítavam…</div>
    <div class="meta">
      <div class="box"><div class="label">Od</div><div id="from" class="value">—</div></div>
      <div class="box"><div class="label">Do</div><div id="to" class="value">—</div></div>
    </div>
    <div id="status" class="status"></div>
    <div id="note" class="note"></div>
  </div>
<script>
const TARGET = 'https://www.cinemacity.sk/static/sk/sk/offers';
const PROXY = 'https://api.codetabs.com/v1/proxy?quest=';
function setStatus(t,c){const e=document.getElementById('status');e.textContent=t;e.className='status'+(c?' '+c:'')}
function show(f,fr,to,n){document.getElementById('film').textContent=f||'—';document.getElementById('from').textContent=fr||'—';document.getElementById('to').textContent=to||'—';document.getElementById('note').textContent=n||''}
function parse(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const raw=(doc.body.textContent||'').replace(/\s+/g,' ').trim();
  let title='',from='—',to='—',note='';
  const m=raw.match(/platí\s+Filmánia\s+na\s+film:\s*([^\.\n]+).*?(\d{1,2}\.\d{1,2}\.?).*?(\d{1,2}\.\d{1,2}\.?)/i);
  if(m){title=m[1].trim();from=m[2].replace(/\s/g,'');to=m[3].replace(/\s/g,'');}
  if(!title){
    const lines=raw.split(/[\n\r]+/).map(s=>s.trim()).filter(Boolean);
    for(let i=0;i<lines.length;i++){
      if(/filmán|1\s*\+\s*1/i.test(lines[i])){
        title=(lines.slice(Math.max(0,i-4),i).reverse().find(s=>s.length>3&&!/^(od|do|vstupenky|filmán|1\s*\+\s*1|cinema|vivo|offers)/i.test(s)))||'';
        const ctx=lines.slice(Math.max(0,i-3),i+8).join(' ');
        const d=ctx.match(/\d{1,2}\.\d{1,2}\.?/g)||[];
        from=d[0]||'—';to=d[1]||'—';
        break;
      }
    }
  }
  return {title,from,to,note};
}
async function load(){
  try{
    setStatus('');
    const r=await fetch(PROXY+encodeURIComponent(TARGET),{cache:'no-store',signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const html=await r.text();
    const x=parse(html);
    show(x.title||'—',x.from,x.to,x.note);
  }catch(e){
    show('—','—','—','');
    setStatus('Chyba: '+e.message,'err');
  }
}
load();
</script>
</body>
</html>
